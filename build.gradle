plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'org.spongepowered.mixin' version '0.7.+'
}

version = "${mod_version}+mc${minecraft_version}"
group = mod_group_id

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    mappings channel: 'official', version: minecraft_version
    copyIdeResources = true

    runs {
        configureEach {
            workingDirectory project.file('run')
            property 'forge.logging.console.level', 'info'
            mods {
                magnot {
                    source sourceSets.main
                }
            }
        }

        client {}
        server { args '--nogui' }
    }
}

mixin {
    add sourceSets.main, 'magnot.refmap.json'
    config 'magnot-forge.mixins.json'
}

sourceSets.main.java.srcDirs = ['ports/forge-1.20.1/src/main/java']
sourceSets.main.resources.srcDirs = ['ports/forge-1.20.1/src/main/resources']

repositories {
    mavenCentral()
    maven { url = 'https://maven.createmod.net' }
}

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"
    implementation fg.deobf("com.simibubi.create:create-${minecraft_version}:${create_version}")
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
}

tasks.named('processResources', ProcessResources).configure {
    inputs.property 'version', project.version
    filesMatching('META-INF/mods.toml') {
        expand version: project.version
    }
    from('src/main/resources') {
        include 'assets/**'
    }
}

tasks.named('jar', Jar).configure {
    manifest.attributes([
            'Specification-Title'   : 'Magnot',
            'Specification-Vendor'  : 'beeboee',
            'Specification-Version' : '1',
            'Implementation-Title'  : project.name,
            'Implementation-Version': project.version,
            'Implementation-Vendor' : 'beeboee',
            'MixinConfigs'          : 'magnot-forge.mixins.json'
    ])
    finalizedBy 'reobfJar'
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            artifact tasks.named('jar')
        }
    }
}
