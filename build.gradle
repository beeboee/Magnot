plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '[6.0,6.2)'
    id 'org.spongepowered.mixin' version '0.7.+'
}

version = "${mod_version}+mc${minecraft_version}"
group = mod_group_id
base { archivesName = mod_id }

sourceCompatibility = JavaVersion.VERSION_1_8
targetCompatibility = JavaVersion.VERSION_1_8

minecraft {
    mappings channel: 'official', version: minecraft_version
    copyIdeResources = true
    runs {
        configureEach {
            workingDirectory project.file('run')
            property 'forge.logging.console.level', 'info'
            mods { magnot { source sourceSets.main } }
        }
        client {}
        server { args '--nogui' }
    }
}

mixin {
    add sourceSets.main, 'magnot.refmap.json'
    config 'magnot-forge.mixins.json'
}

sourceSets.main.java.srcDirs = ['ports/forge-1.16.5/src/main/java']
sourceSets.main.resources.srcDirs = ['ports/forge-1.16.5/src/main/resources']

repositories { mavenCentral() }

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
}

tasks.register('validateCreateVersion') {
    group = 'verification'
    description = 'Checks the maintained Create 1.16 branch still identifies 0.3.2g as its final version.'
    doLast {
        String ref = java.net.URLEncoder.encode(create_source_ref.toString(), 'UTF-8')
        URL url = new URL("https://api.github.com/repos/Creators-of-Create/Create/contents/gradle.properties?ref=${ref}")
        def connection = url.openConnection()
        connection.setRequestProperty('User-Agent', 'Magnot Create 1.16 compatibility validation')
        def response = connection.inputStream.withCloseable { input ->
            new groovy.json.JsonSlurper().parse(input)
        }
        String encoded = response.content.toString().replaceAll('\\s', '')
        String propertiesText = new String(java.util.Base64.decoder.decode(encoded), java.nio.charset.StandardCharsets.UTF_8)
        def match = propertiesText =~ /(?m)^mod_version\s*=\s*(\S+)\s*$/
        if (!match.find()) {
            throw new GradleException('Could not read Create mod_version from the official 1.16 branch.')
        }
        String upstream = match.group(1)
        if (upstream != create_version.toString()) {
            throw new GradleException("Expected final Create ${create_version}, but official ${create_source_ref} reports ${upstream}.")
        }
        println "Validated official Create ${upstream} source for Minecraft ${minecraft_version}."
    }
}

tasks.named('build').configure {
    dependsOn tasks.named('validateCreateVersion')
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.named('processResources', ProcessResources).configure {
    inputs.property 'version', project.version
    filesMatching('META-INF/mods.toml') { expand version: project.version }
    from('src/main/resources') { include 'assets/**' }
}

tasks.named('jar', Jar).configure {
    manifest.attributes 'MixinConfigs': 'magnot-forge.mixins.json'
    finalizedBy 'reobfJar'
}

publishing {
    publications { register('mavenJava', MavenPublication) { artifact tasks.named('jar') } }
}
