buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net' }
        mavenCentral()
        jcenter()
    }
    dependencies {
        classpath 'net.minecraftforge.gradle:ForgeGradle:2.3-SNAPSHOT'
    }
}

apply plugin: 'net.minecraftforge.gradle.forge'
apply plugin: 'maven-publish'

version = '1.0.0+mc1.12.2'
group = 'com.beeboee.magnot'
archivesBaseName = 'magnot'
sourceCompatibility = targetCompatibility = '1.8'

minecraft {
    version = '1.12.2-14.23.5.2860'
    runDir = 'run'
    mappings = 'snapshot_20171003'
}

sourceSets.main.java.srcDirs = ['ports/forge-1.12.2/src/main/java']
sourceSets.main.resources.srcDirs = ['ports/forge-1.12.2/src/main/resources']

processResources {
    inputs.property 'version', project.version
    from(sourceSets.main.resources.srcDirs) {
        include 'mcmod.info'
        expand version: project.version
    }
    from(sourceSets.main.resources.srcDirs) {
        exclude 'mcmod.info'
    }
    from('src/main/resources') {
        include 'assets/magnot/models/**'
        include 'assets/magnot/textures/**'
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact jar
        }
    }
}
