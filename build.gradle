plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.140'
}

version = mod_version
group = mod_group_id

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

repositories {
    maven {
        name = 'Create Maven'
        url = 'https://maven.createmod.net'
    }
    maven {
        name = 'ParchmentMC'
        url = 'https://maven.parchmentmc.org'
    }
    maven {
        name = 'CurseMaven'
        url = 'https://www.cursemaven.com'
        content {
            includeGroup 'curse.maven'
        }
    }
    maven {
        name = 'Modrinth'
        url = 'https://api.modrinth.com/maven'
        content {
            includeGroup 'maven.modrinth'
        }
    }
    maven {
        name = 'RyanHCode Maven'
        url = 'https://maven.ryanhcode.dev/releases'
        content {
            includeGroup 'dev.ryanhcode.sable'
            includeGroup 'dev.ryanhcode.sable-companion'
        }
    }
    maven {
        name = 'BlameJared Maven'
        url = 'https://maven.blamejared.com'
        content {
            includeGroup 'foundry.veil'
            includeGroup 'gg.moonflower'
            includeGroup 'io.github.ocelot'
            includeGroup 'mezz.jei'
        }
    }
    mavenCentral()
}

neoForge {
    version = neoforge_version

    runs {
        configureEach {
            logLevel = org.slf4j.event.Level.INFO
        }

        client {
            client()
        }

        server {
            server()
        }
    }

    mods {
        magnot {
            sourceSet sourceSets.main
        }
    }
}

def localRuntimeMods = fileTree(dir: 'run/mods', include: ['*.jar'])
def compatModrinthProjects = (findProperty('compat_modrinth_projects') ?: '')
        .toString()
        .split(',')
        .collect { it.trim() }
        .findAll { !it.isEmpty() }

tasks.register('downloadCompatTestMods') {
    group = 'magnot'
    description = 'Downloads optional Modrinth compat test jars into run/mods for the dev runtime.'
    notCompatibleWithConfigurationCache('Downloads external Modrinth files for local dev testing.')

    inputs.property('minecraft_version', minecraft_version)
    inputs.property('compat_modrinth_projects', compatModrinthProjects.join(','))
    outputs.dir(layout.projectDirectory.dir('run/mods'))
    outputs.upToDateWhen { false }

    onlyIf {
        (findProperty('compat_modrinth_auto_download') ?: 'true').toString().toBoolean() && !compatModrinthProjects.isEmpty()
    }

    doLast {
        File modsDir = file('run/mods')
        modsDir.mkdirs()

        def urlEncode = { String value ->
            java.net.URLEncoder.encode(value, java.nio.charset.StandardCharsets.UTF_8.toString())
        }

        def fetchJson = { String url ->
            def connection = new URL(url).openConnection()
            connection.setRequestProperty('User-Agent', "Magnot/${mod_version} optional compat test downloader")
            connection.connectTimeout = 15000
            connection.readTimeout = 30000
            connection.inputStream.withCloseable { input ->
                new groovy.json.JsonSlurper().parse(input)
            }
        }

        def downloadFile = { fileInfo ->
            File output = new File(modsDir, fileInfo.filename as String)
            if (output.exists() && output.length() > 0L) {
                println "Compat test mod already present: ${output.name}"
                return
            }

            println "Downloading compat test mod: ${output.name}"
            def connection = new URL(fileInfo.url as String).openConnection()
            connection.setRequestProperty('User-Agent', "Magnot/${mod_version} optional compat test downloader")
            connection.connectTimeout = 15000
            connection.readTimeout = 120000
            connection.inputStream.withCloseable { input ->
                output.withOutputStream { out ->
                    out << input
                }
            }
        }

        Set<String> queuedProjects = new LinkedHashSet<>(compatModrinthProjects)
        Set<String> downloadedVersionIds = new LinkedHashSet<>()
        def queue = new java.util.ArrayDeque<String>(compatModrinthProjects)

        def downloadVersion
        downloadVersion = { version, String reason ->
            if (version == null || version.id == null || !downloadedVersionIds.add(version.id as String)) {
                return
            }

            def jarFile = (version.files ?: []).find { it.primary && (it.filename as String).endsWith('.jar') }
                    ?: (version.files ?: []).find { (it.filename as String).endsWith('.jar') }
            if (jarFile == null) {
                println "No jar file found for Modrinth version ${version.version_number} (${reason})"
                return
            }

            downloadFile(jarFile)

            (version.dependencies ?: [])
                    .findAll { it.dependency_type == 'required' }
                    .each { dependency ->
                        if (dependency.version_id != null) {
                            try {
                                def dependencyVersion = fetchJson("https://api.modrinth.com/v2/version/${urlEncode(dependency.version_id as String)}")
                                downloadVersion(dependencyVersion, "dependency of ${jarFile.filename}")
                            } catch (Exception exception) {
                                println "Could not download required Modrinth dependency ${dependency.version_id}: ${exception.message}"
                            }
                        } else if (dependency.project_id != null && queuedProjects.add(dependency.project_id as String)) {
                            queue.add(dependency.project_id as String)
                        }
                    }
        }

        while (!queue.isEmpty()) {
            String projectSlugOrId = queue.removeFirst()
            String query = "loaders=${urlEncode('[\"neoforge\"]')}&game_versions=${urlEncode('[\"' + minecraft_version + '\"]')}"
            String versionsUrl = "https://api.modrinth.com/v2/project/${urlEncode(projectSlugOrId)}/version?${query}"

            try {
                def versions = fetchJson(versionsUrl)
                if (versions == null || versions.isEmpty()) {
                    println "No ${minecraft_version} NeoForge Modrinth version found for ${projectSlugOrId}"
                    continue
                }

                downloadVersion(versions.first(), projectSlugOrId)
            } catch (Exception exception) {
                println "Could not fetch Modrinth project ${projectSlugOrId}: ${exception.message}"
            }
        }
    }
}

tasks.matching { it.name in ['runClient', 'runServer'] }.configureEach {
    dependsOn tasks.named('downloadCompatTestMods')
}

def requestedCreateVersion = (findProperty('create_version') ?: create_version).toString().trim()
def defaultCreateClassifier = requestedCreateVersion.startsWith('6.0.10-') ? 'slim' : ''
def createClassifier = hasProperty('create_classifier')
        ? property('create_classifier').toString().trim()
        : defaultCreateClassifier
def createCoordinates = "com.simibubi.create:create-${minecraft_version}:${requestedCreateVersion}"
if (!createClassifier.isEmpty()) {
    createCoordinates += ":${createClassifier}"
}

dependencies {
    implementation(createCoordinates) { transitive = false }
    implementation("net.createmod.ponder:ponder-neoforge:${ponder_version}+mc${minecraft_version}")
    compileOnly("dev.engine-room.flywheel:flywheel-neoforge-api-${minecraft_version}:${flywheel_version}")
    runtimeOnly("dev.engine-room.flywheel:flywheel-neoforge-${minecraft_version}:${flywheel_version}")
    implementation("com.tterrag.registrate:Registrate:${registrate_version}")

    runtimeOnly("org.appliedenergistics:appliedenergistics2:${ae2_version}")
    runtimeOnly("de.mari_023:ae2wtlib:${ae2wtlib_version}")

    compileOnly("curse.maven:projecte-${projecte_curse_id}:${projecte_file_id}")
    runtimeOnly("curse.maven:projecte-${projecte_curse_id}:${projecte_file_id}")

    runtimeOnly("maven.modrinth:create-aeronautics:${create_aeronautics_modrinth_version}")
    compileOnly("dev.ryanhcode.sable:sable-neoforge-${minecraft_version}:${sable_version}")
    runtimeOnly("dev.ryanhcode.sable:sable-neoforge-${minecraft_version}:${sable_version}")

    compileOnly("curse.maven:sophisticated-core-${sophisticated_core_curse_id}:${sophisticated_core_file_id}")
    runtimeOnly("curse.maven:sophisticated-core-${sophisticated_core_curse_id}:${sophisticated_core_file_id}")
    runtimeOnly("curse.maven:sophisticated-backpacks-${sophisticated_backpacks_curse_id}:${sophisticated_backpacks_file_id}")
    runtimeOnly("curse.maven:sophisticated-storage-${sophisticated_storage_curse_id}:${sophisticated_storage_file_id}")

    runtimeOnly("top.theillusivec4.curios:curios-neoforge:${curios_version}")
    compileOnly("curse.maven:artifacts-${artifacts_curse_id}:${artifacts_file_id}")
    runtimeOnly("curse.maven:artifacts-${artifacts_curse_id}:${artifacts_file_id}")
    compileOnly("mekanism:Mekanism:${mekanism_version}")
    runtimeOnly("mekanism:Mekanism:${mekanism_version}")

    compileOnly("curse.maven:actually-additions-${actually_additions_curse_id}:${actually_additions_file_id}")
    runtimeOnly("curse.maven:actually-additions-${actually_additions_curse_id}:${actually_additions_file_id}")

    runtimeOnly(localRuntimeMods)
}

tasks.withType(ProcessResources).configureEach {
    inputs.property 'version', mod_version
    inputs.property 'minecraft_version_range', minecraft_version_range
    inputs.property 'neoforge_version_range', neoforge_version_range
    inputs.property 'loader_version_range', loader_version_range
    inputs.property 'create_version_range', create_version_range

    filesMatching('META-INF/neoforge.mods.toml') {
        expand(
                version: mod_version,
                minecraft_version_range: minecraft_version_range,
                neoforge_version_range: neoforge_version_range,
                loader_version_range: loader_version_range,
                create_version_range: create_version_range
        )
    }
}

jar {
    manifest {
        attributes([
                'MixinConfigs': 'magnot.mixins.json'
        ])
    }
}
