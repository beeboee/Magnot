plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.minecraftforge.gradle' version '5.1.74'
    id 'org.spongepowered.mixin' version '0.7.+'
}

version = "${mod_version}+mc${minecraft_version}"
group = mod_group_id
archivesBaseName = mod_id

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

minecraft {
    mappings channel: 'official', version: minecraft_version

    runs {
        configureEach {
            workingDirectory project.file('run')
            property 'forge.logging.console.level', 'info'
            mods {
                magnot { source sourceSets.main }
            }
        }
        client {}
        server { args '--nogui' }
    }
}

mixin {
    add sourceSets.main, 'magnot.refmap.json'
    config 'magnot-forge.mixins.json'
}

sourceSets.main.java.srcDirs = ['ports/forge-1.19.2/src/main/java']
sourceSets.main.resources.srcDirs = ['ports/forge-1.19.2/src/main/resources']

repositories { mavenCentral() }

dependencies {
    minecraft "net.minecraftforge:forge:${minecraft_version}-${forge_version}"
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
}

processResources {
    inputs.property 'version', project.version
    filesMatching('META-INF/mods.toml') { expand version: project.version }
    from('src/main/resources') { include 'assets/**' }
}

jar {
    manifest.attributes 'MixinConfigs': 'magnot-forge.mixins.json'
    finalizedBy 'reobfJar'
}

publishing {
    publications {
        mavenJava(MavenPublication) { artifact jar }
    }
}
