name: Cancel initial port alpha publications

on:
  push:
    branches:
      - main

permissions:
  actions: write

jobs:
  cancel:
    if: github.event.head_commit.message == 'Cancel initial port alpha publications'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel initial matrix
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST /repos/${GITHUB_REPOSITORY}/actions/runs/29380568118/cancel
