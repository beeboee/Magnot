name: Create compatibility

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 10 * * 1'

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - pinned
          - latest-6.0

    steps:
      - name: Check out Magnot
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Resolve Create version
        id: create
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.target }}" == "pinned" ]]; then
            version="$(sed -n 's/^create_version=//p' gradle.properties | head -n 1)"
            if [[ "$version" == 6.0.10-* ]]; then
              classifier='slim'
            else
              classifier=''
            fi
          else
            metadata="$(curl --fail --silent --show-error --location \
              'https://maven.createmod.net/com/simibubi/create/create-1.21.1/maven-metadata.xml')"
            version="$(printf '%s' "$metadata" \
              | sed -n 's:.*<version>\(6\.0\.[^<]*\)</version>.*:\1:p' \
              | tail -n 1)"
            classifier=''
          fi

          if [[ -z "$version" ]]; then
            echo 'Could not resolve a Create version.' >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "classifier=$classifier" >> "$GITHUB_OUTPUT"
          echo "Testing Create $version${classifier:+ with classifier $classifier}"

      - name: Build against Create
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle build --stacktrace \
            -Pcreate_version='${{ steps.create.outputs.version }}' \
            -Pcreate_classifier='${{ steps.create.outputs.classifier }}' \
            2>&1 | tee build.log

      - name: Report compatibility failure
        if: steps.build.outcome == 'failure' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo "### Create compatibility failed: ${{ matrix.target }}"
            echo
            echo "Create version: \`${{ steps.create.outputs.version }}\`"
            echo
            echo '```text'
            grep -nE -B 5 -A 15 '(error:|What went wrong:|Caused by:|Could not|Exception|FAILURE:)' build.log | tail -n 220 || tail -n 220 build.log
            echo '```'
          } > build-comment.md
          gh pr comment '${{ github.event.pull_request.number }}' --body-file build-comment.md

      - name: Fail job when build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
