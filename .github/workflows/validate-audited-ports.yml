name: Validate audited port branches

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    if: github.event.head_commit.message == 'Validate audited port branches'
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: forge-1.20.1
            ref: agent/port-1.20.1-forge-audit-fixes
            java: '17'
            gradle: '8.8'
          - key: fabric-1.20.1
            ref: agent/port-1.20.1-fabric-audit-fixes
            java: '17'
            gradle: '8.12'
          - key: forge-1.19.2
            ref: agent/port-1.19.2-forge-audit-fixes
            java: '17'
            gradle: '7.6.4'
          - key: forge-1.18.2
            ref: agent/port-1.18.2-forge-audit-fixes
            java: '17'
            gradle: '7.6.4'
          - key: forge-1.16.5
            ref: agent/port-1.16.5-forge-audit-fixes
            java: '17'
            gradle: '8.8'
    runs-on: ubuntu-latest
    steps:
      - name: Check out audited port
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ matrix.gradle }}

      - name: Build with exact Create verification
        shell: bash
        run: gradle build --stacktrace --no-daemon

      - name: Confirm release jar
        shell: bash
        run: |
          set -euo pipefail
          jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' | head -n1)"
          [[ -n "$jar" && -s "$jar" ]]
          echo "Built $jar"
