name: Inspect port alpha publications

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    if: github.event.head_commit.message == 'Inspect port alpha publications'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect publication workflow
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _release
          target_sha='87c0f19288e6e790c92c2c2cb3ee9d8e5c14c6ae'
          run_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/publish-port-integration-alphas.yml/runs?per_page=100" --jq ".workflow_runs[] | select(.head_sha == \"${target_sha}\") | .id" | head -n1)"
          {
            echo "target_sha=$target_sha"
            echo "run_id=$run_id"
          } > _release/port-alpha-publication-inspection.txt
          if [[ -n "$run_id" ]]; then
            echo "status=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')" >> _release/port-alpha-publication-inspection.txt
            echo "conclusion=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.conclusion // empty')" >> _release/port-alpha-publication-inspection.txt
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" --jq '.jobs[] | [.id,.name,.status,(.conclusion // "")] | @tsv' >> _release/port-alpha-publication-inspection.txt
          fi
      - name: Commit inspection
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _release/port-alpha-publication-inspection.txt
          git commit -m 'Record port alpha publication inspection'
          git push
