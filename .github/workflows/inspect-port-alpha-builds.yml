name: Inspect port alpha builds

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    if: github.event.head_commit.message == 'Inspect port integration alpha builds'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect exact build workflow run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _porting
          target_sha='98312d6b6887e989ea212d1b3ac25fe570b69619'
          run_id=''
          for attempt in $(seq 1 20); do
            run_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/build-port-integration-alphas.yml/runs?per_page=100" --jq ".workflow_runs[] | select(.head_sha == \"${target_sha}\") | .id" | head -n1)"
            [[ -n "$run_id" ]] && break
            sleep 3
          done
          {
            echo "target_sha=$target_sha"
            echo "run_id=$run_id"
          } > _porting/alpha-build-inspection.txt
          if [[ -n "$run_id" ]]; then
            status="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')"
            conclusion="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.conclusion // empty')"
            echo "status=$status" >> _porting/alpha-build-inspection.txt
            echo "conclusion=$conclusion" >> _porting/alpha-build-inspection.txt
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" --jq '.jobs[] | [.id,.name,.status,(.conclusion // "")] | @tsv' >> _porting/alpha-build-inspection.txt
          fi
      - name: Commit inspection
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _porting/alpha-build-inspection.txt
          git commit -m 'Record port alpha build inspection'
          git push
