name: Retry CurseForge 1.0.1 publication

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.event.head_commit.message == 'Retry CurseForge 1.0.1 publication'
    runs-on: ubuntu-latest
    env:
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}

    steps:
      - name: Verify CurseForge token
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CURSEFORGE_TOKEN:-}" ]]; then
            echo '::error::Repository secret CURSEFORGE_TOKEN is missing or unavailable.'
            exit 1
          fi

      - name: Check out Magnot
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Build Magnot 1.0.1
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^mod_version=//p' gradle.properties | head -n 1)"
          if [[ "$version" != '1.0.1' ]]; then
            echo "::error::Expected version 1.0.1, found $version."
            exit 1
          fi
          gradle build --stacktrace
          test -s build/libs/magnot-1.0.1.jar

      - name: Upload directly to CurseForge
        id: upload
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/metadata.json <<'JSON'
          {
            "changelog": "Adds compatibility with Create 6.0.11 while retaining support for Create 6.0.10.",
            "changelogType": "markdown",
            "displayName": "Magnot 1.0.1",
            "gameVersionNames": ["1.21.1", "NeoForge"],
            "releaseType": "release",
            "relations": {
              "projects": [
                {
                  "slug": "create",
                  "type": "requiredDependency"
                }
              ]
            }
          }
          JSON

          response="$(curl --fail-with-body --silent --show-error \
            -H "X-Api-Token: ${CURSEFORGE_TOKEN}" \
            -F 'metadata=@/tmp/metadata.json;type=application/json' \
            -F 'file=@build/libs/magnot-1.0.1.jar;type=application/java-archive' \
            'https://minecraft.curseforge.com/api/projects/1609524/upload-file')"

          echo "$response"
          file_id="$(jq -r '.id // empty' <<< "$response")"
          if [[ -z "$file_id" ]]; then
            echo '::error::CurseForge did not return a file ID.'
            exit 1
          fi
          echo "file_id=$file_id" >> "$GITHUB_OUTPUT"

      - name: Record CurseForge receipt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _release
          {
            echo 'Magnot 1.0.1 CurseForge upload receipt'
            echo 'status=accepted'
            echo 'project_id=1609524'
            echo 'file_id=${{ steps.upload.outputs.file_id }}'
            echo 'file_url=https://www.curseforge.com/minecraft/mc-mods/magnot/files/${{ steps.upload.outputs.file_id }}'
            echo "accepted_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > _release/curseforge-1.0.1.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _release/curseforge-1.0.1.txt
          git commit -m 'Record CurseForge 1.0.1 upload receipt'
          git push
