name: Audit integration targets

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  audit:
    if: github.event.head_commit.message == 'Audit integration targets'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Inspect newest published integration jars
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: python3 _audit/audit_integrations.py

      - name: Remove downloaded jars
        run: rm -rf _audit/results/jars

      - name: Commit audit report
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/results
          git commit -m 'Record integration target audit'
          git push
