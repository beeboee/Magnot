name: Apply v1.1.0 implementation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: v1.1.0
      - name: Repair staged segment
        run: python -c "from pathlib import Path; p=Path('.v110/part04'); s=p.read_text(); assert len(s)==7999 and s[3680:3696]=='5DhxWsWW2195LOVd'; p.write_text(s[:3688]+'G'+s[3688:])"
      - name: Verify bundle
        run: |
          cat .v110/part* | tr -d '\r\n' > /tmp/v110.b64
          echo 'ee4a5c6b771d744010b5b6f666dd88759e1d94ae3128402a971f2323a3379900  /tmp/v110.b64' | sha256sum -c -
          base64 -d /tmp/v110.b64 > /tmp/v110.tar.gz
          echo '528a958bbf782be306d8423fa11b79e32ac9b6b8fc8bdbfe4caa421b7bef4743  /tmp/v110.tar.gz' | sha256sum -c -
      - name: Extract implementation
        run: tar --exclude='.github/workflows/*' -xzf /tmp/v110.tar.gz
      - name: Remove replaced files
        run: |
          rm -f src/main/java/com/beeboee/magnot/client/MagnotClientEvents.java src/main/java/com/beeboee/magnot/client/MagnotSpecialTextures.java src/main/java/com/beeboee/magnot/compat/sable/MagnotSableClientCompat.java
          rm -f src/main/resources/data/magnot/recipe/ferrous_paste.json src/main/resources/data/magnot/recipe/iron_dust_from_crushing.json src/main/resources/data/magnot/recipe/ferrous_tube.json
          rm -rf .v110
      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Implement adaptive v1.1.0 architecture'
      - name: Push implementation
        run: git push origin HEAD:v1.1.0
