name: Scan unresolved magnet implementations

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  scan:
    if: github.event.head_commit.message == 'Scan unresolved magnet implementations'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Scan jars
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, re, subprocess, urllib.request, zipfile
          from pathlib import Path
          data=json.loads(Path('_audit/results/integration-target-audit.json').read_text())
          targets=['main-1.21.1-neoforge','forge-1.20.1','fabric-1.20.1','forge-1.19.2','forge-1.18.2']
          projects=['artifacts']
          out=Path('_audit/magnet-scan'); jars=out/'jars'; details=out/'javap'
          jars.mkdir(parents=True,exist_ok=True); details.mkdir(parents=True,exist_ok=True)
          lines=['# Unresolved magnet implementation scan','']
          signals=[b'ItemEntity',b'getEntitiesOfClass',b'setDeltaMovement',b'UniversalAttractor',b'Magnetism',b'artifacts$']
          for target in targets:
            for project in projects:
              row=data['targets'][target]['projects'].get(project,{})
              resolution=row.get('resolution',{})
              url=resolution.get('download_url')
              if not url: continue
              jar=jars/f'{target}-{project}.jar'
              req=urllib.request.Request(url,headers={'User-Agent':'Magnot magnet implementation scan'})
              with urllib.request.urlopen(req,timeout=180) as resp: jar.write_bytes(resp.read())
              scored=[]
              with zipfile.ZipFile(jar) as z:
                for name in z.namelist():
                  if not name.endswith('.class') or name.startswith('META-INF/versions/'): continue
                  body=z.read(name)
                  score=sum(10 for s in signals if s in body)
                  low=name.lower()
                  score += 20 if 'attractor' in low else 0
                  score += 15 if 'magnet' in low else 0
                  if score: scored.append((score,name,[s.decode() for s in signals if s in body]))
              scored.sort(key=lambda x:(-x[0],x[1]))
              lines += [f'## {target} — {resolution.get("version")}', '', '| Score | Class | Signals |','|---:|---|---|']
              for score,name,sigs in scored[:30]:
                cls=name[:-6].replace('/','.')
                lines.append(f'| {score} | `{cls}` | {", ".join(sigs)} |')
                proc=subprocess.run(['javap','-classpath',str(jar),'-p','-s','-c',cls],text=True,stdout=subprocess.PIPE,stderr=subprocess.STDOUT)
                (details/f'{target}--{cls.replace(".","_")}.txt').write_text(proc.stdout)
              lines.append('')
          # Inspect the actual pinned ProjectE jar used by main, not fuzzy Modrinth search.
          pe=Path('_audit/magnet-scan/projecte.jar')
          url='https://www.cursemaven.com/curse/maven/projecte-226410/6611984/projecte-226410-6611984.jar'
          req=urllib.request.Request(url,headers={'User-Agent':'Magnot ProjectE audit'})
          with urllib.request.urlopen(req,timeout=180) as resp: pe.write_bytes(resp.read())
          expected='moze_intel/projecte/gameObjs/items/rings/BlackHoleBand.class'
          with zipfile.ZipFile(pe) as z:
            found=expected in z.namelist()
          lines += ['## Main pinned ProjectE','',f'- BlackHoleBand class found: **{found}**','']
          if found:
            cls=expected[:-6].replace('/','.')
            proc=subprocess.run(['javap','-classpath',str(pe),'-p','-s','-c',cls],text=True,stdout=subprocess.PIPE,stderr=subprocess.STDOUT)
            (details/'main--projecte--BlackHoleBand.txt').write_text(proc.stdout)
            selected=[ln for ln in proc.stdout.splitlines() if any(k in ln for k in ('inventoryTick','gravitateEntityTowards','getEntities','ItemEntity'))]
            lines += ['```text','\n'.join(selected[:220]),'```','']
          (out/'magnet-scan.md').write_text('\n'.join(lines)+'\n')
          PY
          rm -rf _audit/magnet-scan/jars _audit/magnet-scan/projecte.jar
      - name: Commit report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/magnet-scan
          git commit -m 'Record unresolved magnet implementation scan'
          git pull --rebase origin main
          git push origin HEAD:main
