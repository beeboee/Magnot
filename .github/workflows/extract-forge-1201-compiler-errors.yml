name: Extract Forge 1.20.1 compiler errors

on:
  push:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  extract:
    if: github.event.head_commit.message == 'Extract Forge 1.20.1 compiler errors'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract compiler messages
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _audit/build-results
          gh api "/repos/${GITHUB_REPOSITORY}/actions/jobs/87258560414/logs" > /tmp/job.log
          grep -n -B 5 -A 12 -E '\.java:[0-9]+: (error|warning):|error: |Could not resolve|Could not find' /tmp/job.log > _audit/build-results/forge-1.20.1-compiler-errors.txt || true
      - name: Commit errors
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/build-results/forge-1.20.1-compiler-errors.txt
          git commit -m 'Record Forge 1.20.1 compiler errors'
          git pull --rebase origin main
          git push origin HEAD:main
