name: Publish to CurseForge

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from gradle.properties, such as 1.0.1
        required: true
        default: 1.0.1
        type: string
      release_type:
        description: CurseForge release channel
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: Changelog shown on CurseForge
        required: true
        default: Adds compatibility with Create 6.0.11 while retaining support for Create 6.0.10.
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Magnot
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(sed -n 's/^mod_version=//p' gradle.properties | head -n 1)"

          if [[ -z "$project_version" ]]; then
            echo 'Could not read mod_version from gradle.properties.' >&2
            exit 1
          fi

          if [[ "$project_version" != "${{ inputs.version }}" ]]; then
            echo "Requested version ${{ inputs.version }} does not match gradle.properties ($project_version)." >&2
            exit 1
          fi

          echo "version=$project_version" >> "$GITHUB_OUTPUT"

      - name: Build release jar
        run: gradle build --stacktrace

      - name: Publish release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1609524
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-dependencies: |
            create(required)
          files: build/libs/magnot-${{ steps.version.outputs.version }}.jar
          name: Magnot ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: ${{ inputs.release_type }}
          changelog: ${{ inputs.changelog }}
          loaders: neoforge
          game-versions: 1.21.1
          game-version-filter: none
          java: 21
          fail-mode: fail
