name: Publish to CurseForge

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version from gradle.properties, such as 1.0.1
        required: true
        default: 1.0.1
        type: string
      release_type:
        description: CurseForge release channel
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: Changelog shown on CurseForge
        required: true
        default: Adds compatibility with Create 6.0.11 while retaining support for Create 6.0.10.
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Verify CurseForge token is available
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CURSEFORGE_TOKEN:-}" ]]; then
            echo '::error::Repository secret CURSEFORGE_TOKEN is missing or unavailable to this workflow.'
            exit 1
          fi

      - name: Check out Magnot
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(sed -n 's/^mod_version=//p' gradle.properties | head -n 1)"

          if [[ -z "$project_version" ]]; then
            echo 'Could not read mod_version from gradle.properties.' >&2
            exit 1
          fi

          if [[ "$project_version" != "${{ inputs.version }}" ]]; then
            echo "Requested version ${{ inputs.version }} does not match gradle.properties ($project_version)." >&2
            exit 1
          fi

          echo "version=$project_version" >> "$GITHUB_OUTPUT"

      - name: Build release jar
        shell: bash
        run: |
          set -euo pipefail
          gradle build --stacktrace
          jar="build/libs/magnot-${{ steps.version.outputs.version }}.jar"
          if [[ ! -s "$jar" ]]; then
            echo "::error::Expected release jar was not created: $jar"
            ls -la build/libs || true
            exit 1
          fi

      - name: Publish release
        id: publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1609524
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-dependencies: |
            create(required)
          files: build/libs/magnot-${{ steps.version.outputs.version }}.jar
          name: Magnot ${{ steps.version.outputs.version }}
          version: ${{ steps.version.outputs.version }}
          version-type: ${{ inputs.release_type }}
          changelog: ${{ inputs.changelog }}
          loaders: neoforge
          game-versions: 1.21.1
          game-version-filter: none
          java: 21
          fail-mode: fail

      - name: Verify CurseForge accepted the upload
        env:
          CURSEFORGE_FILE_ID: ${{ steps.publish.outputs['curseforge-version'] }}
          CURSEFORGE_FILE_URL: ${{ steps.publish.outputs['curseforge-url'] }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CURSEFORGE_FILE_ID:-}" || -z "${CURSEFORGE_FILE_URL:-}" ]]; then
            echo '::error::The publishing action did not return a CurseForge file ID and URL.'
            exit 1
          fi

          echo "CurseForge accepted file ID: $CURSEFORGE_FILE_ID"
          echo "CurseForge file URL: $CURSEFORGE_FILE_URL"
          {
            echo '## CurseForge publication accepted'
            echo
            echo "- File ID: \`$CURSEFORGE_FILE_ID\`"
            echo "- URL: $CURSEFORGE_FILE_URL"
          } >> "$GITHUB_STEP_SUMMARY"
