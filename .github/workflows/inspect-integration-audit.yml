name: Inspect integration audit

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    if: github.event.head_commit.message == 'Inspect integration audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect exact audit run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _audit
          target_sha='af7ef60606a1d650f45f329e982af0f4183d1ef8'
          run_id=''
          for attempt in $(seq 1 30); do
            run_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/audit-integration-targets.yml/runs?per_page=100" --jq ".workflow_runs[] | select(.head_sha == \"${target_sha}\") | .id" | head -n1)"
            [[ -n "$run_id" ]] && break
            sleep 2
          done
          {
            echo "target_sha=$target_sha"
            echo "run_id=$run_id"
          } > _audit/integration-audit-inspection.txt
          if [[ -n "$run_id" ]]; then
            echo "status=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')" >> _audit/integration-audit-inspection.txt
            echo "conclusion=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.conclusion // empty')" >> _audit/integration-audit-inspection.txt
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" --jq '.jobs[] | [.id,.name,.status,(.conclusion // "")] | @tsv' >> _audit/integration-audit-inspection.txt
          fi
      - name: Commit inspection
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/integration-audit-inspection.txt
          git commit -m 'Record integration audit inspection'
          git push
