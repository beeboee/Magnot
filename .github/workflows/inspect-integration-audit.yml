name: Inspect integration audit

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    if: github.event.head_commit.message == 'Inspect integration audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect exact audit run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _audit
          target_sha='af713c5c211f4b64d70b8319b2041ecccc6c8833'
          run_id=''
          for attempt in $(seq 1 40); do
            run_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/audit-integration-targets.yml/runs?per_page=100" --jq ".workflow_runs[] | select(.head_sha == \"${target_sha}\") | .id" | head -n1)"
            [[ -n "$run_id" ]] && break
            sleep 3
          done
          [[ -n "$run_id" ]]
          for attempt in $(seq 1 120); do
            status="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')"
            [[ "$status" == completed ]] && break
            sleep 5
          done
          {
            echo "target_sha=$target_sha"
            echo "run_id=$run_id"
            echo "status=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')"
            echo "conclusion=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.conclusion // empty')"
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" --jq '.jobs[] | [.id,.name,.status,(.conclusion // "")] | @tsv'
          } > _audit/integration-audit-inspection.txt
      - name: Commit inspection
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/integration-audit-inspection.txt
          git commit -m 'Record integration audit inspection'
          git pull --rebase origin main
          git push origin HEAD:main
