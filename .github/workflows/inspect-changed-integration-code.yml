name: Inspect changed integration code

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  inspect:
    if: github.event.head_commit.message == 'Inspect changed integration code'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Inspect candidate classes and bytecode
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, re, subprocess, urllib.request, zipfile
          from pathlib import Path

          root = Path('_audit/results')
          data = json.loads((root / 'integration-target-audit.json').read_text())
          out = root / 'changed-code'
          jars = out / 'jars'
          javap = out / 'javap'
          jars.mkdir(parents=True, exist_ok=True)
          javap.mkdir(parents=True, exist_ok=True)

          keywords = {
              'projecte': ['blackhole', 'black_hole', 'gravitateentitytowards', 'band', 'ring'],
              'artifacts': ['magnetism', 'magnet', 'itementity', 'getentitiesofclass'],
              'reliquary': ['fortunecoin', 'fortune_coin', 'pickupitems', 'teleportentitytoplayer'],
              'enderio': ['electromagnet', 'vacuum', 'getentities', 'itementity'],
          }
          wanted = {'projecte', 'artifacts', 'reliquary', 'enderio'}
          lines = ['# Changed integration code inspection', '']

          for target_key, target in data['targets'].items():
              for project, row in target.get('projects', {}).items():
                  if project not in wanted:
                      continue
                  inspection = row.get('inspection') or {}
                  missing = [c for c, cr in (inspection.get('classes') or {}).items() if not cr.get('found')]
                  if not missing:
                      continue
                  resolution = row.get('resolution') or {}
                  url = resolution.get('download_url')
                  if not url:
                      continue
                  filename = re.sub(r'[^A-Za-z0-9._+-]+', '_', resolution.get('filename') or f'{project}.jar')
                  jar = jars / f'{target_key}--{project}--{filename}'
                  if not jar.exists():
                      req = urllib.request.Request(url, headers={'User-Agent': 'Magnot changed integration audit'})
                      with urllib.request.urlopen(req, timeout=180) as r:
                          jar.write_bytes(r.read())
                  with zipfile.ZipFile(jar) as z:
                      classes = [n for n in z.namelist() if n.endswith('.class') and not n.startswith('META-INF/versions/')]
                      scored = []
                      for name in classes:
                          low = name.lower()
                          score = sum(5 for k in keywords[project] if k in low)
                          try:
                              body = z.read(name).lower()
                          except Exception:
                              body = b''
                          score += sum(1 for k in keywords[project] if k.encode() in body)
                          if score:
                              scored.append((score, name))
                      scored.sort(key=lambda x: (-x[0], x[1]))
                      candidates = [name for _, name in scored[:30]]
                  lines += [f'## {target_key} — {project}', '', f"Version: `{resolution.get('version')}`", '', 'Missing targets:']
                  lines += [f'- `{c}`' for c in missing]
                  lines += ['', 'Highest-signal candidate classes:']
                  lines += [f'- `{c}`' for c in candidates] or ['- none']
                  lines.append('')
                  for entry in candidates[:12]:
                      cls = entry[:-6].replace('/', '.')
                      result = subprocess.run(['javap', '-classpath', str(jar), '-p', '-s', '-c', cls], text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
                      dest = javap / f"{target_key}--{project}--{cls.replace('.', '_')}.txt"
                      dest.write_text(result.stdout)
                      method_lines = [ln.strip() for ln in result.stdout.splitlines() if re.match(r'^(public|private|protected|static|final|abstract|synchronized|native|strictfp|\s)+(?:[\w.$<>\[\]/]+\s+)+[\w$<>]+\(.*\);?$', ln.strip())]
                      if method_lines:
                          lines += [f'`{cls}` methods:'] + [f'- `{m}`' for m in method_lines[:30]] + ['']

          (out / 'changed-integration-code.md').write_text('\n'.join(lines) + '\n')
          PY
          rm -rf _audit/results/changed-code/jars
      - name: Commit inspection
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/results/changed-code
          git commit -m 'Record changed integration code inspection'
          git pull --rebase origin main
          git push origin HEAD:main
