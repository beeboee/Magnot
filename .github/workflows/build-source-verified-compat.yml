name: Build source-verified compatibility branches

on:
  push:
    branches: [main]
    paths: [.github/workflows/build-source-verified-compat.yml]

permissions:
  contents: read

jobs:
  build:
    if: github.event.head_commit.message == 'Rebuild source-verified compatibility branches'
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: main-1.21.1
            branch: agent/main-compat-source-refresh
            java: '21'
            gradle: '8.8'
          - key: forge-1.20.1
            branch: agent/compat-1.20.1-forge-alpha2
            java: '17'
            gradle: '8.8'
          - key: fabric-1.20.1
            branch: agent/compat-1.20.1-fabric-alpha2
            java: '17'
            gradle: '8.12'
          - key: forge-1.19.2
            branch: agent/compat-1.19.2-forge-alpha2
            java: '17'
            gradle: '7.6.4'
          - key: forge-1.18.2
            branch: agent/compat-1.18.2-forge-alpha2
            java: '17'
            gradle: '7.6.4'
          - key: forge-1.16.5
            branch: agent/compat-1.16.5-forge-alpha2
            java: '17'
            gradle: '8.8'
          - key: forge-1.12.2
            branch: agent/compat-1.12.2-forge-alpha2
            java: '8'
            gradle: '4.10.3'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out compatibility branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ matrix.gradle }}

      - name: Build
        run: gradle build --stacktrace

      - name: Verify release jar
        shell: bash
        run: |
          set -euo pipefail
          jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*-dev.jar' | sort | head -n1)"
          test -n "$jar"
          test -s "$jar"
          echo "Built $jar"
