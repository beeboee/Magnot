name: Publish Magnot 1.0.1 with mc-publish

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.event.head_commit.message == 'Publish Magnot 1.0.1 with mc-publish'
    runs-on: ubuntu-latest
    env:
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}

    steps:
      - name: Verify CurseForge token
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CURSEFORGE_TOKEN:-}" ]]; then
            echo '::error::Repository secret CURSEFORGE_TOKEN is missing or unavailable.'
            exit 1
          fi

      - name: Check out Magnot
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Build Magnot 1.0.1
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^mod_version=//p' gradle.properties | head -n 1)"
          if [[ "$version" != '1.0.1' ]]; then
            echo "::error::Expected version 1.0.1, found $version."
            exit 1
          fi
          gradle build --stacktrace
          test -s build/libs/magnot-1.0.1.jar

      - name: Publish to CurseForge
        id: publish
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1609524
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-dependencies: |
            create(required)
          files: build/libs/magnot-1.0.1.jar
          name: Magnot 1.0.1
          version: 1.0.1
          version-type: release
          changelog: Adds compatibility with Create 6.0.11 while retaining support for Create 6.0.10.
          loaders: neoforge
          game-versions: 1.21.1
          game-version-filter: none
          java: 21
          fail-mode: fail

      - name: Verify and record CurseForge receipt
        env:
          FILE_ID: ${{ steps.publish.outputs.curseforge-version }}
          FILE_URL: ${{ steps.publish.outputs.curseforge-url }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${FILE_ID:-}" || -z "${FILE_URL:-}" ]]; then
            echo '::error::CurseForge did not return a file ID and URL.'
            exit 1
          fi
          mkdir -p _release
          {
            echo 'Magnot 1.0.1 CurseForge upload receipt'
            echo 'status=accepted'
            echo 'project_id=1609524'
            echo "file_id=$FILE_ID"
            echo "file_url=$FILE_URL"
            echo "accepted_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > _release/curseforge-1.0.1.txt
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _release/curseforge-1.0.1.txt
          git commit -m 'Record CurseForge 1.0.1 upload receipt'
          git push
