name: Inspect main compatibility audit

on:
  push:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    if: github.event.head_commit.message == 'Inspect main compat audit'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inspect audit run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _porting/source-audit
          target_sha='2ebb7f1ece7eaae0518218865139015b0ee9d37a'
          run_id=''
          for attempt in $(seq 1 20); do
            run_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/audit-main-compat.yml/runs?per_page=50" --jq ".workflow_runs[] | select(.head_sha == \"${target_sha}\") | .id" | head -n1)"
            [[ -n "$run_id" ]] && break
            sleep 3
          done
          {
            echo "target_sha=$target_sha"
            echo "run_id=$run_id"
            if [[ -n "$run_id" ]]; then
              echo "status=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')"
              echo "conclusion=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.conclusion // empty')"
              gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=50" --jq '.jobs[] | [.id,.name,.status,(.conclusion // "")] | @tsv'
            fi
          } > _porting/source-audit/main-audit-inspection.txt
      - name: Commit inspection
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _porting/source-audit/main-audit-inspection.txt
          git commit -m 'Record main compatibility audit inspection'
          git push
