name: Publish Magnot 1.0.1 to CurseForge

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-curseforge-1.0.1.yml

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Magnot
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          project_version="$(sed -n 's/^mod_version=//p' gradle.properties | head -n 1)"
          if [[ "$project_version" != "1.0.1" ]]; then
            echo "Expected Magnot 1.0.1, found $project_version." >&2
            exit 1
          fi

      - name: Build release jar
        run: gradle build --stacktrace

      - name: Publish release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1609524
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-dependencies: |
            create(required)
          files: build/libs/magnot-1.0.1.jar
          name: Magnot 1.0.1
          version: 1.0.1
          version-type: release
          changelog: Adds compatibility with Create 6.0.11 while retaining support for Create 6.0.10.
          loaders: neoforge
          game-versions: 1.21.1
          game-version-filter: none
          java: 21
          fail-mode: fail
