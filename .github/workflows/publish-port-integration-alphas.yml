name: Publish port integration alphas

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.event.head_commit.message == 'Publish port integration alphas'
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - key: forge-1.20.1
            branch: 1.20.1-forge
            java: '17'
            gradle: '8.8'
            loader: forge
            game_version: 1.20.1
            dependencies: create(required)
            integration_summary: Simple Magnets, Item Collectors, Sophisticated Core, Artifacts, Mekanism, Draconic Evolution, Reliquary, Modular Routers, Ender IO, and additional experimental hooks.
          - key: fabric-1.20.1
            branch: 1.20.1-fabric
            java: '17'
            gradle: '8.8'
            loader: fabric
            game_version: 1.20.1
            dependencies: create-fabric(required)
            integration_summary: Simple Magnets, Item Collectors, Artifacts, and an experimental AE2 Wireless Terminals hook.
          - key: forge-1.19.2
            branch: 1.19.2-forge
            java: '17'
            gradle: '8.8'
            loader: forge
            game_version: 1.19.2
            dependencies: create(required)
            integration_summary: Simple Magnets, Item Collectors, Artifacts, Mekanism, Reliquary, Sophisticated Core, Modular Routers, and additional experimental hooks.
          - key: forge-1.18.2
            branch: 1.18.2-forge
            java: '17'
            gradle: '7.6.4'
            loader: forge
            game_version: 1.18.2
            dependencies: create(required)
            integration_summary: Simple Magnets, Item Collectors, Mekanism, Draconic Evolution, Reliquary, Sophisticated Core, Modular Routers, and additional experimental hooks.
          - key: forge-1.16.5
            branch: 1.16.5-forge
            java: '17'
            gradle: '8.8'
            loader: forge
            game_version: 1.16.5
            dependencies: create(required)
            integration_summary: Simple Magnets, Item Collectors, Mekanism, Draconic Evolution, Reliquary, Modular Routers, Industrial Foregoing, and additional experimental hooks.
          - key: forge-1.12.2
            branch: 1.12.2-forge-legacy
            java: '8'
            gradle: '4.10.3'
            loader: forge
            game_version: 1.12.2
            dependencies: ''
            integration_summary: Legacy core and public compatibility API only; researched integration versions are documented but no built-in magnet hooks are claimed.
    runs-on: ubuntu-latest
    steps:
      - name: Verify CurseForge token
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CURSEFORGE_TOKEN:-}" ]]; then
            echo '::error::Repository secret CURSEFORGE_TOKEN is missing.'
            exit 1
          fi

      - name: Check out merged port
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ matrix.gradle }}

      - name: Build and select release jar
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          gradle build --stacktrace
          mkdir -p dist
          jar="$(find build/libs -maxdepth 1 -type f -name '*.jar' \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name '*-dev.jar' \
            | sort | head -n 1)"
          if [[ -z "$jar" || ! -s "$jar" ]]; then
            echo '::error::No non-sources release jar was produced.'
            find build/libs -maxdepth 1 -type f -printf '%f\n' || true
            exit 1
          fi
          output="dist/magnot-${{ matrix.key }}-1.0.0-alpha.1.jar"
          cp "$jar" "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "Selected $jar as $output"

      - name: Publish alpha to CurseForge
        id: curseforge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1609524
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          curseforge-dependencies: ${{ matrix.dependencies }}
          files: ${{ steps.artifact.outputs.path }}
          name: Magnot 1.0.0 Alpha 1 — ${{ matrix.loader }} ${{ matrix.game_version }}
          version: 1.0.0-alpha.1-${{ matrix.key }}
          version-type: alpha
          changelog: |
            Experimental port alpha for Minecraft ${{ matrix.game_version }} on ${{ matrix.loader }}.

            Integration coverage: ${{ matrix.integration_summary }}

            These compatibility hooks are optional and compile-tested. Newly added integrations are experimental until they receive broader runtime testing.
          loaders: ${{ matrix.loader }}
          game-versions: ${{ matrix.game_version }}
          game-version-filter: none
          java: ${{ matrix.java }}
          fail-mode: fail

      - name: Write publication receipt
        if: always()
        env:
          FILE_ID: ${{ steps.curseforge.outputs.curseforge-version }}
          FILE_URL: ${{ steps.curseforge.outputs.curseforge-url }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p receipt
          if [[ -n "${FILE_ID:-}" && -n "${FILE_URL:-}" ]]; then
            status=accepted
          else
            status=failed
          fi
          {
            echo "key=${{ matrix.key }}"
            echo "branch=${{ matrix.branch }}"
            echo "loader=${{ matrix.loader }}"
            echo "game_version=${{ matrix.game_version }}"
            echo "status=$status"
            echo "file_id=${FILE_ID:-}"
            echo "file_url=${FILE_URL:-}"
            echo "recorded_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > receipt/${{ matrix.key }}.txt

      - name: Upload publication receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curseforge-receipt-${{ matrix.key }}
          path: receipt/${{ matrix.key }}.txt
          if-no-files-found: error

  report:
    if: always() && github.event.head_commit.message == 'Publish port integration alphas'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download receipts
        uses: actions/download-artifact@v4
        with:
          pattern: curseforge-receipt-*
          path: /tmp/receipts
          merge-multiple: true
      - name: Commit publication receipts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _release/port-alphas
          cp /tmp/receipts/*.txt _release/port-alphas/
          {
            echo '# CurseForge port alpha publication report'
            echo
            echo "Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo '| Target | Status | CurseForge file |'
            echo '|---|---|---|'
            for receipt in /tmp/receipts/*.txt; do
              key=$(sed -n 's/^key=//p' "$receipt" | head -n1)
              status=$(sed -n 's/^status=//p' "$receipt" | head -n1)
              id=$(sed -n 's/^file_id=//p' "$receipt" | head -n1)
              url=$(sed -n 's/^file_url=//p' "$receipt" | head -n1)
              if [[ -n "$id" && -n "$url" ]]; then
                file="[$id]($url)"
              else
                file='—'
              fi
              echo "| $key | $status | $file |"
            done
          } > _release/port-alpha-publication-report.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _release/port-alphas _release/port-alpha-publication-report.md
          git commit -m 'Record CurseForge port alpha publications'
          git push
