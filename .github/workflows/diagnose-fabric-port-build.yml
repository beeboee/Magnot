name: Diagnose Fabric port build

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write

jobs:
  diagnose:
    if: github.event.head_commit.message == 'Diagnose Fabric port alpha build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract Fabric failure
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _porting
          gh api "/repos/${GITHUB_REPOSITORY}/actions/jobs/87243102704/logs" > /tmp/fabric.log
          {
            echo 'Fabric 1.20.1 merged-port build failure'
            echo '==========================================='
            grep -n -B 12 -A 30 -E 'FAILURE:|What went wrong|Caused by:|Could not|Exception|error:' /tmp/fabric.log | head -n 260 || true
          } > _porting/fabric-1.20.1-failure.txt
      - name: Commit diagnostic
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _porting/fabric-1.20.1-failure.txt
          git commit -m 'Record Fabric port alpha build failure'
          git push
