name: Inspect CurseForge 1.0.1 retry

on:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    if: github.event.head_commit.message == 'Inspect CurseForge 1.0.1 retry'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Collect exact retry result
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _release
          target_sha='ed5dd4fb7f1e3f49441436c9a5acb8b9940b0479'
          run_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/retry-curseforge-1.0.1.yml/runs?per_page=100" --jq ".workflow_runs[] | select(.head_sha == \"${target_sha}\") | .id" | head -n 1)"

          if [[ -z "$run_id" ]]; then
            echo 'retry_run=not_found' > _release/curseforge-1.0.1-diagnostic.txt
          else
            status="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')"
            conclusion="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.conclusion // empty')"
            jobs_json="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs")"
            job_id="$(jq -r '.jobs[0].id // empty' <<< "$jobs_json")"
            {
              echo "retry_run_id=$run_id"
              echo "head_sha=$target_sha"
              echo "status=$status"
              echo "conclusion=$conclusion"
              echo "job_id=$job_id"
              echo
              echo 'Relevant log lines:'
            } > _release/curseforge-1.0.1-diagnostic.txt

            if [[ -n "$job_id" ]]; then
              gh api "/repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > /tmp/retry.log || true
              grep -iE 'curseforge|token|upload|error|warning|response|file_id|file id|http|curl|accepted|forbidden|unauthorized|bad request|metadata|gameversion' /tmp/retry.log | tail -n 180 >> _release/curseforge-1.0.1-diagnostic.txt || true
            fi
          fi

      - name: Commit diagnostic result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _release/curseforge-1.0.1-diagnostic.txt
          git commit -m 'Record exact CurseForge 1.0.1 retry result'
          git push
