name: Run deep compatibility audit

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  audit:
    if: github.event.head_commit.message == 'Run deep compatibility audit'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Inspect registered target bytecode
        run: python3 _audit/deep_audit.py
      - name: Remove downloaded jars
        run: rm -rf _audit/deep-jars
      - name: Back up report
        uses: actions/upload-artifact@v4
        with:
          name: deep-compat-audit
          path: _audit/deep-results
          if-no-files-found: error
      - name: Commit report
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/deep-results
          git commit -m 'Record deep compatibility audit'
          git pull --rebase origin main
          git push origin HEAD:main
