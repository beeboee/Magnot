name: Build port integration alphas

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.event.head_commit.message == 'Build port integration alphas'
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: forge-1.20.1
            branch: agent/compat-1.20.1-forge-alpha
            java: '17'
            gradle: '8.8'
          - key: fabric-1.20.1
            branch: agent/compat-1.20.1-fabric-alpha
            java: '17'
            gradle: '8.8'
          - key: forge-1.19.2
            branch: agent/compat-1.19.2-forge-alpha
            java: '17'
            gradle: '8.8'
          - key: forge-1.18.2
            branch: agent/compat-1.18.2-forge-alpha
            java: '17'
            gradle: '7.6.4'
          - key: forge-1.16.5
            branch: agent/compat-1.16.5-forge-alpha
            java: '17'
            gradle: '8.8'
          - key: forge-1.12.2
            branch: agent/compat-1.12.2-forge-alpha
            java: '8'
            gradle: '4.10.3'
    runs-on: ubuntu-latest
    steps:
      - name: Check out alpha branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ matrix.gradle }}

      - name: Build and capture result
        id: build
        shell: bash
        run: |
          set +e
          gradle build --stacktrace > build-${{ matrix.key }}.log 2>&1
          code=$?
          set -e
          mkdir -p result
          if [[ $code -eq 0 ]]; then
            status=success
          else
            status=failure
          fi
          {
            echo "key=${{ matrix.key }}"
            echo "branch=${{ matrix.branch }}"
            echo "java=${{ matrix.java }}"
            echo "gradle=${{ matrix.gradle }}"
            echo "status=$status"
            echo "exit_code=$code"
            echo
            echo "Last 160 log lines"
            echo "=================="
            tail -n 160 build-${{ matrix.key }}.log
          } > result/${{ matrix.key }}.txt
          if [[ $code -eq 0 ]]; then
            find build/libs -maxdepth 1 -type f -name '*.jar' -printf '%f\n' | sort > result/${{ matrix.key }}-jars.txt
          fi

      - name: Upload build result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.key }}
          path: result
          if-no-files-found: error

  report:
    if: always() && github.event.head_commit.message == 'Build port integration alphas'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          path: /tmp/results
          merge-multiple: true

      - name: Commit matrix report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _porting/alpha-builds
          cp /tmp/results/*.txt _porting/alpha-builds/
          {
            echo '# Port integration alpha build report'
            echo
            echo "Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo
            echo '| Target | Status | Java | Gradle |'
            echo '|---|---|---:|---:|'
            for result in /tmp/results/forge-*.txt /tmp/results/fabric-*.txt; do
              [[ "$result" == *-jars.txt ]] && continue
              key=$(sed -n 's/^key=//p' "$result" | head -n1)
              status=$(sed -n 's/^status=//p' "$result" | head -n1)
              java=$(sed -n 's/^java=//p' "$result" | head -n1)
              gradle=$(sed -n 's/^gradle=//p' "$result" | head -n1)
              echo "| $key | $status | $java | $gradle |"
            done
          } > _porting/alpha-build-report.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _porting/alpha-builds _porting/alpha-build-report.md
          git commit -m 'Record port integration alpha builds'
          git push
