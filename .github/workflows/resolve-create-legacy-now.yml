name: Resolve final legacy Create artifact

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  resolve:
    if: github.event.head_commit.message == 'Resolve final legacy Create artifact'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Query CurseForge API
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, urllib.parse, urllib.request
          from pathlib import Path
          token=os.environ['CURSEFORGE_TOKEN']
          result={}
          for game in ['1.19.2','1.18.2','1.16.5']:
            q=urllib.parse.urlencode({'gameVersion':game,'pageSize':100})
            req=urllib.request.Request('https://api.curseforge.com/v1/mods/328085/files?'+q,headers={'x-api-key':token,'User-Agent':'Magnot Create artifact resolver'})
            with urllib.request.urlopen(req,timeout=60) as response:
              files=json.load(response).get('data',[])
            candidates=[]
            for f in files:
              versions=[str(v).lower() for v in f.get('gameVersions',[])]
              if game.lower() not in versions or 'forge' not in versions or f.get('releaseType') != 1:
                continue
              candidates.append(f)
            candidates.sort(key=lambda f:f.get('fileDate',''),reverse=True)
            f=candidates[0] if candidates else None
            result[game]=None if f is None else {
              'file_id':f['id'],
              'display_name':f.get('displayName'),
              'file_name':f.get('fileName'),
              'file_date':f.get('fileDate'),
              'game_versions':f.get('gameVersions',[])
            }
          Path('_audit/create-legacy-versions.json').write_text(json.dumps(result,indent=2)+'\n',encoding='utf-8')
          PY
      - name: Commit result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/create-legacy-versions.json
          git commit -m 'Record final legacy Create artifact'
          git pull --rebase origin main
          git push origin HEAD:main
