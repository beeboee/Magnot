name: Validate repaired integration targets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  validate:
    if: github.event.head_commit.message == 'Validate repaired integration targets'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Validate classes, methods, and descriptor shapes
        id: validate
        continue-on-error: true
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: python3 _audit/validate_repaired_targets.py
      - name: Remove downloaded jars
        if: always()
        run: rm -rf _audit/final-validation/jars
      - name: Commit validation report
        if: always()
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/final-validation/repaired-target-validation.json _audit/final-validation/repaired-target-validation.md
          git commit -m 'Record repaired integration validation'
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Fail on mismatches
        if: steps.validate.outcome != 'success'
        run: exit 1
