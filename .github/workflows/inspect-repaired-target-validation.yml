name: Inspect repaired target validation

on:
  push:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  inspect:
    if: github.event.head_commit.message == 'Inspect repaired target validation'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Wait for validator
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          target_sha='3de3f664ef0b750d2140d7b74f801a0cbe0dc321'
          run_id=''
          for attempt in $(seq 1 30); do
            run_id="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/validate-repaired-targets.yml/runs?per_page=50" --jq ".workflow_runs[] | select(.head_sha == \"${target_sha}\") | .id" | head -n1)"
            [[ -n "$run_id" ]] && break
            sleep 3
          done
          [[ -n "$run_id" ]]
          for attempt in $(seq 1 120); do
            status="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')"
            [[ "$status" == completed ]] && break
            sleep 10
          done
          mkdir -p _audit/final-validation
          {
            echo "run_id=$run_id"
            echo "status=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.status')"
            echo "conclusion=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq '.conclusion // empty')"
            gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=50" --jq '.jobs[] | [.id,.name,.status,(.conclusion // "")] | @tsv'
          } > _audit/final-validation/status.txt
      - name: Commit status
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/final-validation/status.txt
          git commit -m 'Record repaired validation status'
          git pull --rebase origin main
          git push origin HEAD:main
