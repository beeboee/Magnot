name: Extract Forge 1.20.1 build failure

on:
  push:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  extract:
    if: github.event.head_commit.message == 'Extract Forge 1.20.1 build failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract final log section
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _audit/build-results
          gh api "/repos/${GITHUB_REPOSITORY}/actions/jobs/87258560414/logs" > /tmp/job.log
          tail -n 220 /tmp/job.log > _audit/build-results/forge-1.20.1-latest-failure.txt
      - name: Commit log
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/build-results/forge-1.20.1-latest-failure.txt
          git commit -m 'Record latest Forge 1.20.1 failure'
          git pull --rebase origin main
          git push origin HEAD:main
