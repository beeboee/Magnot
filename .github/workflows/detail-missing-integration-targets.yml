name: Detail missing integration targets

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  detail:
    if: github.event.head_commit.message == 'Detail missing integration targets'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build missing-target detail report
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('_audit/results/integration-target-audit.json')
          data = json.loads(p.read_text())
          lines = ['# Missing integration target details', '']
          for target, row in data['targets'].items():
              missing_rows = []
              for project, pr in row.get('projects', {}).items():
                  ins = pr.get('inspection') or {}
                  for cls, cr in (ins.get('classes') or {}).items():
                      if not cr.get('found'):
                          missing_rows.append((project, cls, cr.get('candidates') or [], pr.get('resolution') or {}))
              if not missing_rows:
                  continue
              lines += [f'## {target}', '']
              for project, cls, candidates, resolution in missing_rows:
                  lines += [f'### {project}: `{cls}`', '', f"Resolved version: `{resolution.get('version', 'unresolved')}`", '', 'Candidate classes:']
                  if candidates:
                      lines += [f'- `{c}`' for c in candidates]
                  else:
                      lines.append('- none')
                  lines.append('')
          Path('_audit/results/missing-target-details.md').write_text('\n'.join(lines) + '\n')
          PY
      - name: Commit detail report
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/results/missing-target-details.md
          git commit -m 'Record missing integration target details'
          git pull --rebase origin main
          git push origin HEAD:main
