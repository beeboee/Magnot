name: Audit main compatibility targets

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  audit:
    if: github.event.head_commit.message == 'Audit main compatibility targets'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Audit current integration jars and Create versions
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          import re
          import subprocess
          import urllib.error
          import urllib.parse
          import urllib.request
          import xml.etree.ElementTree as ET
          import zipfile
          from pathlib import Path

          ROOT = Path.cwd()
          OUT = ROOT / '_porting' / 'source-audit'
          JARS = OUT / 'jars'
          OUT.mkdir(parents=True, exist_ok=True)
          JARS.mkdir(parents=True, exist_ok=True)
          UA = 'Magnot compatibility source audit (github.com/beeboee/Magnot)'
          CF_TOKEN = os.environ.get('CURSEFORGE_TOKEN', '')

          integrations = [
              {'name':'Sophisticated Core','modrinth':'sophisticated-core','search':'Sophisticated Core','patterns':['MagnetUpgradeWrapper']},
              {'name':'AE2 Wireless Terminals','modrinth':None,'search':'Applied Energistics 2 Wireless Terminals','patterns':['MagnetHandler','magnet_card']},
              {'name':'ProjectE','modrinth':None,'curse_id':226410,'search':'ProjectE','patterns':['BlackHoleBand']},
              {'name':'Artifacts','modrinth':'artifacts','search':'Artifacts','patterns':['Magnetism']},
              {'name':'Mekanism','modrinth':'mekanism','search':'Mekanism','patterns':['MagneticAttraction']},
              {'name':'Draconic Evolution','modrinth':'draconic-evolution','search':'Draconic Evolution','patterns':['/Magnet.class','Magnet']},
              {'name':'Reliquary Reincarnations','modrinth':'reliquary-reincarnations','search':'Reliquary Reincarnations','patterns':['FortuneCoin']},
              {'name':'Actually Additions','modrinth':None,'curse_id':228404,'search':'Actually Additions','patterns':['Magnet']},
              {'name':'Mob Grinding Utils','modrinth':None,'search':'Mob Grinding Utils','patterns':['AbsorptionHopper']},
              {'name':'Item Collectors','modrinth':'item-collectors','search':'Item Collectors','patterns':['CollectorBlockEntity']},
              {'name':'Simple Magnets','modrinth':'simple-magnets','search':'Simple Magnets','patterns':['MagnetItem']},
              {'name':'Modular Routers','modrinth':'modular-routers','search':'Modular Routers','patterns':['VacuumModule','CompiledVacuum']},
              {'name':'Ender IO','modrinth':'enderio','search':'Ender IO','patterns':['Electromagnet','VacuumMachine','VacuumChest']},
              {'name':'Industrial Foregoing','modrinth':'industrial-foregoing','search':'Industrial Foregoing','patterns':['InfinityBackpack','Vacuum','Backpack']},
          ]

          def request(url, headers=None, timeout=45):
              merged = {'User-Agent': UA}
              if headers:
                  merged.update(headers)
              req = urllib.request.Request(url, headers=merged)
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                  return resp.read(), dict(resp.headers)

          def get_json(url, headers=None):
              body, _ = request(url, headers)
              return json.loads(body)

          def safe_name(value):
              return re.sub(r'[^A-Za-z0-9._-]+', '-', value).strip('-')

          def download(url, output):
              if output.exists() and output.stat().st_size:
                  return
              body, _ = request(url, timeout=180)
              output.write_bytes(body)

          def modrinth_latest(slug, game='1.21.1', loader='neoforge'):
              q = urllib.parse.urlencode({
                  'loaders': json.dumps([loader], separators=(',',':')),
                  'game_versions': json.dumps([game], separators=(',',':')),
              })
              versions = get_json(f'https://api.modrinth.com/v2/project/{urllib.parse.quote(slug)}/version?{q}')
              if not versions:
                  return None
              selected = next((v for v in versions if v.get('version_type') == 'release'), versions[0])
              files = selected.get('files') or []
              jar = next((f for f in files if f.get('primary') and f.get('filename','').endswith('.jar')), None)
              jar = jar or next((f for f in files if f.get('filename','').endswith('.jar')), None)
              if not jar:
                  return None
              return {
                  'source':'Modrinth', 'project':slug, 'version':selected.get('version_number'),
                  'published':selected.get('date_published'), 'channel':selected.get('version_type'),
                  'url':jar.get('url'), 'filename':jar.get('filename'), 'version_id':selected.get('id')
              }

          def cf_headers():
              return {'x-api-key': CF_TOKEN} if CF_TOKEN else {}

          def curse_project_id(entry):
              if entry.get('curse_id'):
                  return entry['curse_id']
              if not CF_TOKEN:
                  return None
              params = urllib.parse.urlencode({'gameId':432,'classId':6,'searchFilter':entry['search'],'pageSize':20})
              data = get_json('https://api.curseforge.com/v1/mods/search?' + params, cf_headers()).get('data', [])
              if not data:
                  return None
              needle = re.sub(r'[^a-z0-9]+','',entry['name'].lower())
              def score(mod):
                  name = re.sub(r'[^a-z0-9]+','',mod.get('name','').lower())
                  slug = re.sub(r'[^a-z0-9]+','',mod.get('slug','').lower())
                  return (name == needle) * 10 + (needle in name) * 4 + (needle in slug) * 3
              data.sort(key=score, reverse=True)
              return data[0].get('id')

          def curse_latest(entry, game='1.21.1', loader_name='NeoForge'):
              project_id = curse_project_id(entry)
              if not project_id or not CF_TOKEN:
                  return None
              params = urllib.parse.urlencode({'gameVersion':game,'pageSize':50})
              files = get_json(f'https://api.curseforge.com/v1/mods/{project_id}/files?{params}', cf_headers()).get('data', [])
              loader_lower = loader_name.lower()
              candidates = []
              for f in files:
                  game_versions = [str(v).lower() for v in f.get('gameVersions', [])]
                  if game.lower() not in game_versions:
                      continue
                  has_loader_marker = any(v in ('forge','fabric','neoforge','quilt') for v in game_versions)
                  if has_loader_marker and loader_lower not in game_versions:
                      continue
                  if not str(f.get('fileName','')).endswith('.jar'):
                      continue
                  candidates.append(f)
              if not candidates:
                  return None
              candidates.sort(key=lambda f: f.get('fileDate',''), reverse=True)
              selected = next((f for f in candidates if f.get('releaseType') == 1), candidates[0])
              url = selected.get('downloadUrl')
              if not url:
                  # CurseForge's documented CDN form for files whose API omits downloadUrl.
                  fid = int(selected['id'])
                  s = str(fid)
                  url = f'https://edge.forgecdn.net/files/{s[:-3]}/{s[-3:]}/{urllib.parse.quote(selected["fileName"])}'
              return {
                  'source':'CurseForge','project_id':project_id,'version':selected.get('displayName') or selected.get('fileName'),
                  'published':selected.get('fileDate'),'channel':selected.get('releaseType'),
                  'url':url,'filename':selected.get('fileName'),'file_id':selected.get('id')
              }

          def resolve(entry):
              if entry.get('modrinth'):
                  try:
                      found = modrinth_latest(entry['modrinth'])
                      if found:
                          return found
                  except Exception as exc:
                      entry.setdefault('resolution_errors', []).append('Modrinth: ' + repr(exc))
              try:
                  found = curse_latest(entry)
                  if found:
                      return found
              except Exception as exc:
                  entry.setdefault('resolution_errors', []).append('CurseForge: ' + repr(exc))
              return None

          def class_candidates(jar_path, patterns, limit=12):
              with zipfile.ZipFile(jar_path) as zf:
                  classes = [n for n in zf.namelist() if n.endswith('.class') and '$' not in n]
              scored = []
              for cls in classes:
                  lower = cls.lower()
                  score = sum(10 for p in patterns if p.lower() in lower)
                  if score:
                      scored.append((score, len(cls), cls))
              scored.sort(key=lambda row:(-row[0], row[1], row[2]))
              return [row[2][:-6].replace('/','.') for row in scored[:limit]]

          def javap(jar_path, class_name):
              cmd = ['javap','-classpath',str(jar_path),'-p','-s','-c',class_name]
              proc = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, timeout=45)
              text = proc.stdout
              keep = []
              interesting = False
              for line in text.splitlines():
                  stripped = line.strip()
                  if re.search(r'\b(public|private|protected|static|final|abstract)\b.*\(', stripped) or stripped.startswith('descriptor:'):
                      interesting = True
                      keep.append(line)
                      continue
                  if any(token in line for token in ('getEntities','getEntitiesOfClass','playerTouch','setDeltaMovement','teleport','addItem','insertItem','tryToInsert','pullItem','pickupItems','inventoryTick','tick(')):
                      keep.append(line)
                      continue
                  if interesting and (re.match(r'^\s*\d+:', line) or stripped.startswith('Code:')):
                      keep.append(line)
                  elif interesting and not stripped:
                      interesting = False
              return '\n'.join(keep[:260])

          results = {'generated_at':dt.datetime.now(dt.timezone.utc).isoformat(),'target':'Minecraft 1.21.1 NeoForge','integrations':[],'create':{}}
          for entry in integrations:
              row = {'name':entry['name'],'patterns':entry['patterns']}
              resolved = resolve(entry)
              row['resolution_errors'] = entry.get('resolution_errors', [])
              if not resolved:
                  row['status'] = 'unresolved'
                  results['integrations'].append(row)
                  continue
              row.update(resolved)
              jar_path = JARS / (safe_name(entry['name']) + '-' + safe_name(str(resolved['filename'])))
              try:
                  download(resolved['url'], jar_path)
                  row['jar_size'] = jar_path.stat().st_size
                  row['classes'] = class_candidates(jar_path, entry['patterns'])
                  row['javap'] = {cls:javap(jar_path, cls) for cls in row['classes'][:6]}
                  row['status'] = 'inspected' if row['classes'] else 'no-target-class-found'
              except Exception as exc:
                  row['status'] = 'inspection-failed'
                  row['inspection_error'] = repr(exc)
              results['integrations'].append(row)

          # Resolve official Create Maven versions for Forge/NeoForge ports.
          for game in ['1.21.1','1.20.1','1.19.2','1.18.2','1.16.5']:
              url = f'https://maven.createmod.net/com/simibubi/create/create-{game}/maven-metadata.xml'
              try:
                  body, _ = request(url)
                  root = ET.fromstring(body)
                  versions = [v.text for v in root.findall('.//version') if v.text]
                  results['create'][game + ' Forge/NeoForge'] = {
                      'source':url,
                      'latest':versions[-1] if versions else None,
                      'recent':versions[-10:]
                  }
              except Exception as exc:
                  results['create'][game + ' Forge/NeoForge'] = {'source':url,'error':repr(exc)}

          try:
              create_fabric = modrinth_latest('create-fabric','1.20.1','fabric')
              results['create']['1.20.1 Fabric'] = create_fabric
          except Exception as exc:
              results['create']['1.20.1 Fabric'] = {'error':repr(exc)}

          (OUT / 'main-compat-audit.json').write_text(json.dumps(results, indent=2) + '\n', encoding='utf-8')

          lines = [
              '# Main compatibility source audit','',
              f"Generated: {results['generated_at']}",'',
              'Target: Minecraft 1.21.1 / NeoForge','',
              'This report inspects the newest resolvable jar for each integration and records relevant class names, method descriptors, and item-movement calls. It is an audit aid, not a substitute for an in-game smoke test.','',
              '## Integration targets','',
              '| Integration | Resolved version | Source | Status | Candidate classes |',
              '|---|---|---|---|---|'
          ]
          for row in results['integrations']:
              classes = '<br>'.join(f'`{c}`' for c in row.get('classes', [])[:4]) or '—'
              lines.append(f"| {row['name']} | `{row.get('version','—')}` | {row.get('source','—')} | {row['status']} | {classes} |")
          lines += ['', '## Create version resolution','', '| Target | Latest | Source |', '|---|---|---|']
          for target, row in results['create'].items():
              lines.append(f"| {target} | `{row.get('latest') or row.get('version') or '—'}` | {row.get('source','Modrinth')} |")
          lines += ['', '## Relevant bytecode signatures','']
          for row in results['integrations']:
              lines += [f"### {row['name']} — {row.get('version','unresolved')}",'']
              if row.get('resolution_errors'):
                  lines.append('Resolution notes: `' + ' | '.join(row['resolution_errors']) + '`')
                  lines.append('')
              if not row.get('javap'):
                  lines += [f"Status: **{row['status']}**",'']
                  continue
              for cls, text in row['javap'].items():
                  lines += [f'#### `{cls}`','', '```text', text or '(no selected signatures)', '```','']
          (OUT / 'main-compat-audit.md').write_text('\n'.join(lines), encoding='utf-8')
          PY

      - name: Commit audit report
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _porting/source-audit/jars
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _porting/source-audit/main-compat-audit.json _porting/source-audit/main-compat-audit.md
          git commit -m 'Record main compatibility source audit'
          git push
