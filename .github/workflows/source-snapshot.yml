name: Source snapshot

on:
  push:
    branches: [v1.1.0]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package repository source
        run: |
          tar --exclude=.git --exclude=.gradle --exclude=build --exclude=run -czf /tmp/magnot-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: magnot-source
          path: /tmp/magnot-source.tar.gz
          if-no-files-found: error
          retention-days: 1
