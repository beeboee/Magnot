name: Check CurseForge secret availability

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  check:
    if: github.event.head_commit.message == 'Check CurseForge secret availability'
    runs-on: ubuntu-latest
    env:
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Record whether the secret is available
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _diagnostics
          if [[ -n "${CURSEFORGE_TOKEN:-}" ]]; then
            echo 'CURSEFORGE_TOKEN=present' > _diagnostics/curseforge-secret-status.txt
          else
            echo 'CURSEFORGE_TOKEN=missing' > _diagnostics/curseforge-secret-status.txt
          fi
      - name: Commit result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _diagnostics/curseforge-secret-status.txt
          git commit -m 'Record CurseForge secret status'
          git push
