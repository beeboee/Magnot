name: Resolve legacy Create versions

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  resolve:
    if: github.event.head_commit.message == 'Resolve legacy Create versions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Query CurseForge Create files
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os, urllib.parse, urllib.request
          from pathlib import Path
          token=os.environ['CURSEFORGE_TOKEN']
          result={}
          for game in ['1.19.2','1.18.2','1.16.5']:
            q=urllib.parse.urlencode({'gameVersion':game,'pageSize':100})
            req=urllib.request.Request('https://api.curseforge.com/v1/mods/328085/files?'+q,headers={'x-api-key':token,'User-Agent':'Magnot Create version audit'})
            with urllib.request.urlopen(req,timeout=60) as r: files=json.load(r)['data']
            files=[f for f in files if game in f.get('gameVersions',[]) and 'Forge' in f.get('gameVersions',[]) and f.get('releaseType')==1]
            files.sort(key=lambda f:f.get('fileDate',''),reverse=True)
            f=files[0] if files else None
            result[game]=None if f is None else {'file_id':f['id'],'display_name':f['displayName'],'file_name':f['fileName'],'file_date':f['fileDate'],'game_versions':f['gameVersions']}
          out=Path('_audit/create-legacy-versions.json')
          out.write_text(json.dumps(result,indent=2)+'\n')
          PY
      - name: Commit result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/create-legacy-versions.json
          git commit -m 'Record legacy Create versions'
          git pull --rebase origin main
          git push origin HEAD:main
