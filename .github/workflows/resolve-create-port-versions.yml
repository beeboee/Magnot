name: Resolve Create port versions

on:
  push:
    branches: [main]
    paths: [.github/workflows/resolve-create-port-versions.yml]

permissions:
  contents: write

jobs:
  resolve:
    if: github.event.head_commit.message == 'Resolve Create port versions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve latest Create builds
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.parse, urllib.request
          from pathlib import Path

          headers = {'User-Agent':'Magnot Create compatibility resolver'}
          token = os.environ.get('CURSEFORGE_TOKEN','')
          cf_headers = dict(headers)
          if token:
              cf_headers['x-api-key'] = token

          targets = [
              ('1.21.1','neoforge',6),
              ('1.20.1','forge',1),
              ('1.20.1','fabric',4),
              ('1.19.2','forge',1),
              ('1.18.2','forge',1),
              ('1.16.5','forge',1),
          ]

          def get_json(url, h=headers):
              req=urllib.request.Request(url,headers=h)
              with urllib.request.urlopen(req,timeout=60) as r:
                  return json.load(r)

          def modrinth(mc, loader):
              slug = 'create-fabric' if loader == 'fabric' else 'create'
              q=urllib.parse.urlencode({'loaders':json.dumps([loader],separators=(',',':')),'game_versions':json.dumps([mc],separators=(',',':'))})
              try:
                  data=get_json(f'https://api.modrinth.com/v2/project/{slug}/version?{q}')
              except Exception as e:
                  return {'error':repr(e)}
              releases=[v for v in data if v.get('version_type')=='release']
              chosen=(releases or data or [None])[0]
              if not chosen:
                  return {'error':'no matching version'}
              file=next((f for f in chosen.get('files',[]) if f.get('primary')),None) or next(iter(chosen.get('files',[])),{})
              return {'version':chosen.get('version_number'),'channel':chosen.get('version_type'),'published':chosen.get('date_published'),'filename':file.get('filename'),'url':file.get('url'),'version_id':chosen.get('id')}

          def curseforge(mc, loader_type):
              if not token:
                  return {'error':'CURSEFORGE_TOKEN unavailable'}
              q=urllib.parse.urlencode({'gameVersion':mc,'modLoaderType':loader_type,'pageSize':50})
              try:
                  data=get_json(f'https://api.curseforge.com/v1/mods/328085/files?{q}',cf_headers).get('data',[])
              except Exception as e:
                  return {'error':repr(e)}
              releases=[f for f in data if f.get('releaseType')==1]
              chosen=(releases or data or [None])[0]
              if not chosen:
                  return {'error':'no matching file'}
              return {'display_name':chosen.get('displayName'),'filename':chosen.get('fileName'),'file_id':chosen.get('id'),'published':chosen.get('fileDate'),'game_versions':chosen.get('gameVersions'),'dependencies':chosen.get('dependencies')}

          report={}
          for mc,loader,loader_type in targets:
              report[f'{mc}-{loader}']={'modrinth':modrinth(mc,loader),'curseforge':curseforge(mc,loader_type)}

          out=Path('_audit/create-versions')
          out.mkdir(parents=True,exist_ok=True)
          (out/'versions.json').write_text(json.dumps(report,indent=2)+'\n')
          lines=['# Resolved Create versions','', '| Target | Modrinth latest release | CurseForge latest release | CurseForge file |','|---|---|---|---:|']
          for key,row in report.items():
              m=row['modrinth']; c=row['curseforge']
              lines.append(f"| {key} | `{m.get('version','—')}` | `{c.get('display_name') or c.get('filename') or '—'}` | `{c.get('file_id','—')}` |")
          (out/'README.md').write_text('\n'.join(lines)+'\n')
          PY
      - name: Commit resolution
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add _audit/create-versions
          git commit -m 'Record resolved Create port versions'
          git push
