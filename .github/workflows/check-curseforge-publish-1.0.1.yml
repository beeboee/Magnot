name: Check CurseForge 1.0.1 publication

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/check-curseforge-publish-1.0.1.yml

permissions:
  actions: read
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out Magnot
        uses: actions/checkout@v4

      - name: Wait for publication workflow
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          run_id=""
          status=""
          conclusion=""
          html_url=""

          for attempt in $(seq 1 30); do
            response="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/publish-curseforge-1.0.1.yml/runs?per_page=1")"
            run_id="$(jq -r '.workflow_runs[0].id // empty' <<< "$response")"
            status="$(jq -r '.workflow_runs[0].status // empty' <<< "$response")"
            conclusion="$(jq -r '.workflow_runs[0].conclusion // empty' <<< "$response")"
            html_url="$(jq -r '.workflow_runs[0].html_url // empty' <<< "$response")"

            if [[ -n "$run_id" && "$status" == "completed" ]]; then
              break
            fi

            sleep 10
          done

          if [[ -z "$run_id" ]]; then
            conclusion="no-run-found"
          elif [[ "$status" != "completed" ]]; then
            conclusion="timed-out"
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          echo "conclusion=$conclusion" >> "$GITHUB_OUTPUT"
          echo "html_url=$html_url" >> "$GITHUB_OUTPUT"

      - name: Record publication result
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .github/release-status
          cat > .github/release-status/1.0.1.txt <<EOF
          workflow=Publish Magnot 1.0.1 to CurseForge
          run_id=${{ steps.publish.outputs.run_id }}
          status=${{ steps.publish.outputs.status }}
          conclusion=${{ steps.publish.outputs.conclusion }}
          url=${{ steps.publish.outputs.html_url }}
          checked_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          EOF

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/release-status/1.0.1.txt
          git commit -m 'Record CurseForge 1.0.1 publication result'
          git push
